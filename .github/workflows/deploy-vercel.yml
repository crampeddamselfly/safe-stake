name: Deploy to Vercel

# We build the static bundle entirely on GitHub Actions so every env var
# lives in one place (GitHub Secrets). Vercel only receives the prebuilt
# output. This keeps collaborator access scoped to the GitHub repo —
# nobody needs an account on Vercel to ship.

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile

      - name: Build static bundle
        env:
          VITE_REOWN_PROJECT_ID: ${{ secrets.VITE_REOWN_PROJECT_ID }}
          VITE_RPC_URL_1: ${{ secrets.VITE_RPC_URL_1 }}
          VITE_SITE_ORIGIN: ${{ vars.VITE_SITE_ORIGIN || 'https://safenet-staking.denna.eth.limo' }}
        run: bun run build

      - name: Package as Vercel prebuilt output
        # Vercel's `--prebuilt` deploy expects .vercel/output/ with a
        # minimal config.json and the static files under static/.
        # Reference: https://vercel.com/docs/build-output-api/v3
        run: |
          rm -rf .vercel/output
          mkdir -p .vercel/output
          printf '{"version":3}' > .vercel/output/config.json
          cp -r build .vercel/output/static

      - name: Deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: bunx vercel@latest deploy --prebuilt --prod --token="$VERCEL_TOKEN"
