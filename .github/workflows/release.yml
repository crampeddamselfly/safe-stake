name: Release

# Fires only when the CI workflow finishes successfully on main.
# semantic-release reads the commit log, picks a SemVer bump, generates
# CHANGELOG.md, commits the version bump, tags vX.Y.Z, and creates a
# GitHub Release. The tag push then triggers the deploy workflows
# (deploy-ipfs.yml + deploy-vercel.yml).

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
          token: ${{ secrets.PERSONAL_GITHUB_TOKEN }}
      # semantic-release v25 requires Node >=22.14. oven-sh/setup-bun
      # leaves the runner's default Node (20.x) in place, so install
      # Node 22 explicitly. Bun resolves before Node on PATH for the
      # rest of the steps; this only matters for the semantic-release
      # Node subprocess.
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bunx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.PERSONAL_GITHUB_TOKEN }}
