name: Deploy to IPFS

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build-and-pin:
    runs-on: ubuntu-latest
    environment: production
    outputs:
      cid: ${{ steps.pin.outputs.cid }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Build
        env:
          VITE_REOWN_PROJECT_ID: ${{ secrets.VITE_REOWN_PROJECT_ID }}
          VITE_SITE_ORIGIN: ${{ vars.VITE_SITE_ORIGIN || 'https://safenet-staking.denna.eth.limo' }}
        run: bun run build
      - name: Compute build checksum
        run: |
          find build -type f -print0 | sort -z | xargs -0 sha256sum > build.sha256
          sha256sum build.sha256
      - name: Pin to Pinata
        id: pin
        env:
          PINATA_JWT: ${{ secrets.PINATA_JWT }}
        run: bun run pin:ipfs
      - name: Summary
        run: |
          echo "## IPFS pin successful" >> $GITHUB_STEP_SUMMARY
          echo "CID: \`${{ steps.pin.outputs.cid }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Set ENS contenthash for \`safenet-staking.denna.eth\`:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "    ipfs://${{ steps.pin.outputs.cid }}/safe-stake/" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "[Open ENS app](https://app.ens.domains/safenet-staking.denna.eth)" >> $GITHUB_STEP_SUMMARY
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: |
            build
            build.sha256
          retention-days: 14
