<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.svg" type="image/svg+xml" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Independent non-custodial staking UI for Safenet Beta — operated by Denna Labs."
    />
    <title>Safe Stake — by Denna Labs</title>
    <script>
      // FOUC-free theme: apply class before first paint.
      (function () {
        try {
          var s = localStorage.getItem("mode-watcher-mode")
          var t =
            s === "light" || s === "dark"
              ? s
              : window.matchMedia("(prefers-color-scheme: light)").matches
                ? "light"
                : "dark"
          var c = document.documentElement.classList
          if (t === "dark") c.add("dark")
          else c.remove("dark")
        } catch (_) {}
      })()
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
